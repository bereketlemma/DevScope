version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: devscope-postgres
    environment:
      POSTGRES_USER: devscope
      POSTGRES_PASSWORD: devscope
      POSTGRES_DB: devscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devscope-backend
    environment:
      DEBUG: "False"
      ENV: "prod"
      DATABASE_URL: postgresql+asyncpg://devscope:devscope@postgres:5432/devscope
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery:
    build: ./backend
    container_name: devscope-celery
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DEBUG: "False"
      ENV: "prod"
      DATABASE_URL: postgresql+asyncpg://devscope:devscope@postgres:5432/devscope
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: devscope-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
  redis_data:
